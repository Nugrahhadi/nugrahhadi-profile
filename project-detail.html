    <script>
      (function () {
        /**
         * Read the ?id= param from the URL and render the matching project.
         */
        function getProjectId() {
          const params = new URLSearchParams(window.location.search);
          return params.get("id") || "";
        }

        /**
         * Build the tech-item HTML for one technology entry.
         * @param {{ name: string, iconHtml: string, colorClass: string }} tech
         */
        function renderTechItem(tech) {
          return `
            <div class="tech-item">
              <span class="tech-item-icon ${tech.colorClass}">${tech.iconHtml}</span>
              <span class="tech-item-name">${tech.name}</span>
            </div>`;
        }

        /**
         * Build the thumbnail HTML for one image path.
         * @param {string} src
         * @param {number} index
         * @param {boolean} isActive
         */
        function renderThumb(src, index, isActive) {
          return `
            <div class="gallery-thumb${isActive ? " active" : ""}"
                 data-src="${src}"
                 data-index="${index}"
                 onclick="switchHero(this)"
                 title="Screenshot ${index + 1}">
              <img src="${src}" alt="Screenshot ${index + 1}" loading="lazy" />
            </div>`;
        }

        /**
         * Render the role column content.
         * @param {{ intro: string[], tasks: string[] }} role
         */
        function renderRole(role) {
          const intros = (role.intro || []).map((p) => `<p>${p}</p>`).join("");
          const tasks = (role.tasks || []).map((t) => `<li>${t}</li>`).join("");
          return `
            <div class="role-text">
              ${intros}
              ${tasks ? `<ul>${tasks}</ul>` : ""}
            </div>`;
        }

        /**
         * Main render function.
         */
        function render() {
          const id = getProjectId();
          const wrapper = document.getElementById("detailWrapper");
          const project = PROJECTS[id];

          /* ── 404 state ── */
          if (!project) {
            wrapper.innerHTML = `
              <div class="detail-placeholder">
                <div class="placeholder-icon"><i class="fas fa-search"></i></div>
                <p>Project <strong>"${id || "unknown"}"</strong> not found.</p>
                <p style="margin-top:8px;font-size:0.875rem;">
                  <a href="index.html#portfolio" style="color:#ad5aff;text-decoration:none;">← Back to Portfolio</a>
                </p>
              </div>`;
            document.title = "Project Not Found";
            return;
          }

          /* ── Update page title ── */
          document.title = `${project.title} — Portfolio`;

          /* ── Build all image sources (hero first, then thumbs) ── */
          const allImages = [
            project.images.hero,
            ...(project.images.thumbs || []),
          ];
          // Deduplicate while preserving order
          const uniqueImages = [
            ...new Map(allImages.map((s) => [s, s])).values(),
          ];

          /* ── Thumbnails HTML ── */
          const thumbsHtml =
            uniqueImages.length > 1
              ? `<div class="gallery-thumbs">
                  ${uniqueImages.map((src, i) => renderThumb(src, i, i === 0)).join("")}
                </div>`
              : ""; // hide strip if only one image

          /* ── Tech list HTML ── */
          const techHtml = project.tech.map(renderTechItem).join("");

          /* ── Button visibility helpers ── */
          const hasWebsite =
            project.links.website && project.links.website !== "#";
          const hasSource =
            project.links.source && project.links.source !== "#";

          const websiteBtn = `
            <a href="${project.links.website || "#"}"
               class="action-btn action-btn-primary"
               ${hasWebsite ? 'target="_blank" rel="noopener"' : ""}
               title="${hasWebsite ? "Open live site" : "Live demo not available"}">
              <i class="fas fa-globe"></i> Live Demo
            </a>`;

          const sourceBtn = hasSource
            ? `<a href="${project.links.source}"
               class="action-btn action-btn-secondary"
               target="_blank" rel="noopener"
               title="View source code">
              <i class="fab fa-github"></i> Source Code
            </a>`
            : "";

          /* ── Keterangan badge ── */
          const keteranganClass =
            {
              "Client Project": "keterangan-client",
              "University Project": "keterangan-university",
              "Personal Project": "keterangan-personal",
            }[project.keterangan] || "";

          const keteranganBadge = project.keterangan
            ? `<span class="project-keterangan-badge ${keteranganClass}">${project.keterangan}</span>`
            : "";

          /* ── Full page HTML ── */
          wrapper.innerHTML = `
            <!-- Section 1: Title -->
            <section class="project-header">
              <div class="project-meta">
                <span class="project-category-badge">${project.category}</span>
                ${keteranganBadge}
                <span class="project-date">${project.date}</span>
              </div>
              <h1 class="project-title">${project.title}</h1>
              <p class="project-description-lead">${project.description}</p>
            </section>

            <div class="section-divider"></div>

            <!-- Section 2: Gallery -->
            <section class="gallery-section">
              <div class="gallery-hero">
                <img src="${project.images.hero}" alt="${project.title}" id="heroImage" />
              </div>
              ${thumbsHtml}
            </section>

            <div class="section-divider"></div>

            <!-- Section 3: Details (2-col) -->
            <section class="detail-section">
              <div class="detail-grid">

                <!-- Left: Tech Stack (MUST be first in DOM for mobile stacking order) -->
                <div class="detail-col tech-col">
                  <h2 class="detail-col-title">Technologies Used</h2>
                  <div class="tech-list">${techHtml}</div>
                </div>

                <!-- Right: My Role -->
                <div class="detail-col role-col">
                  <h2 class="detail-col-title">My Role</h2>
                  ${renderRole(project.role)}
                </div>

              </div>
            </section>

            <div class="section-divider"></div>

            <!-- Section 4: CTA Buttons -->
            <section class="actions-section">
              ${websiteBtn}
              ${sourceBtn}
            </section>
          `;
        }

        /* ── Run on DOM ready ── */
        document.addEventListener("DOMContentLoaded", render);
      })();

      /**
       * Switch the hero image when a thumbnail is clicked.
       * Exposed globally so the inline onclick="switchHero(this)" works.
       */
      function switchHero(thumbEl) {
        const newSrc = thumbEl.getAttribute("data-src");

        // Update hero
        const hero = document.getElementById("heroImage");
        if (hero) {
          hero.style.opacity = "0";
          hero.style.transition = "opacity 0.2s ease";
          setTimeout(() => {
            hero.src = newSrc;
            hero.style.opacity = "1";
          }, 200);
        }

        // Update active thumbnail
        document.querySelectorAll(".gallery-thumb").forEach((t) => {
          t.classList.remove("active");
        });
        thumbEl.classList.add("active");
      }
    </script>
  </body>
</html>
